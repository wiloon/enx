name: Deploy enx-api

on:
  push:
    branches:
      - main
    paths:
      - 'enx-api/**'
      - '.github/workflows/deploy-enx-api.yml'
      - 'enx-api/Containerfile'

jobs:
  build-and-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: enx-api/Containerfile
          push: true
          tags: |
            ghcr.io/wiloon/enx-api:latest
            ghcr.io/wiloon/enx-api:${{ github.sha }}

  deploy:
    name: Deploy to EC2 Tokyo
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH and restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_TOKYO_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_TOKYO_SSH_KEY }}
          script: |
            nerdctl pull ghcr.io/wiloon/enx-api:latest
            sudo systemctl restart enx-api
            sudo systemctl is-active --quiet enx-api && echo "enx-api started OK"
