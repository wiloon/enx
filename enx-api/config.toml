[enx]
dev-mode = true
port = 8091

[data-service]
address = "localhost:50051"

[mysql]
address = "mysql.wiloon.com:3306"

[sync]
# minute
duration = 60

[news]
expire-time = "-720h"
gc-duration = "24h"

[log]
level = "debug"
path = "/data/rssx/logs/"
file-name = "rssx.log"

[youdao]
url = "https://openapi.youdao.com/api"
# app-key and app-secret must be set via YOUDAO_APP_KEY / YOUDAO_APP_SECRET env vars, never in this file

[resend]
# api-key must be set via RESEND_API_KEY env var, never in this file
from = "ENX <no-reply@wiloon.com>"

[app]
frontend-base-url = "https://enx-ui-lab.wiloon.com"
